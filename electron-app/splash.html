<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LobCut</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f0f0f;
        color: #fafafa;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 54px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #a1a1aa;
        font-size: 15px;
      }

      .dots::after {
        content: "";
        animation: dots 1.2s steps(4, end) infinite;
      }

      @keyframes dots {
        0% { content: ""; }
        25% { content: "."; }
        50% { content: ".."; }
        75%, 100% { content: "..."; }
      }

      .error {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LobCut</h1>
      <p id="status"><span class="dots">Starting services</span></p>
    </main>
    <script>
      const statusLine = document.getElementById('status');
      if (window.lobcut) {
        window.lobcut.onDockerStatus((status) => {
          if (status === 'ready') {
            statusLine.textContent = 'Services ready';
          } else if (status === 'error') {
            statusLine.className = 'error';
            statusLine.textContent = 'Docker is unavailable';
          } else {
            statusLine.className = '';
            statusLine.innerHTML = '<span class="dots">Starting services</span>';
          }
        });
      }
    </script>
  </body>
</html>
