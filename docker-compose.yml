services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
      - ${WATCH_HOST_INPUT:-./input}:/watch/user-input
      # Add extra host watch folders here, then map them with WATCH_PATH_MAPPINGS.
      # Example:
      # - D:/Z-work/Input:/watch/z-work-input
    environment:
      - PYTHONPATH=/app/python-service
      - DB_PATH=/app/data/jobs.db
      # Example: WATCH_PATH_MAPPINGS=D:\Z-work\Input=/watch/z-work-input
      - WATCH_PATH_MAPPINGS=${WATCH_PATH_MAPPINGS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    restart: unless-stopped
    command: python main.py

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./input:/app/input:ro
      - ./data:/app/data
      - ./output:/app/output
      - ./dashboard/dist:/app/dashboard/dist:ro
      - ./openclaw-workspace:/app/openclaw-workspace:ro
    environment:
      - DB_PATH=/app/data/jobs.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost:8000/auth/callback
      - JWT_SECRET=${JWT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3}
      - CORS_ALLOW_ORIGINS=http://localhost:3000
      - DASHBOARD_URL=http://localhost:3000
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
      - OPENCLAW_PUBLIC_URL=http://localhost:18789
    restart: unless-stopped
    command: uvicorn app:app --app-dir python-service --host 0.0.0.0 --port 8000

  openclaw:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./openclaw-workspace/openclaw.json:/app/openclaw.json:ro
      - ./openclaw-workspace/SOUL.md:/app/workspace/SOUL.md:ro
      - ./openclaw-workspace/AGENTS.md:/app/workspace/AGENTS.md:ro
      - ./openclaw-workspace/HEARTBEAT.md:/app/workspace/HEARTBEAT.md
      - ./openclaw-workspace/skills:/app/workspace/skills:ro
      - ./openclaw-workspace/memory:/app/workspace/memory
      - ./input:/watch/input:ro
      - openclaw-data:/root/.openclaw
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_ID=${TELEGRAM_ALLOWED_USER_ID}
      - MEDIA_SERVICE_URL=http://api:8000
    ports:
      - "18789:18789"
    command: >
      sh -c "npm install -g openclaw@latest &&
             mkdir -p /root/.openclaw &&
             cp /app/openclaw.json /root/.openclaw/openclaw.json &&
             openclaw gateway --port 18789 --allow-unconfigured"
    depends_on:
      api:
        condition: service_started
    profiles:
      - openclaw
    restart: unless-stopped

  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev

  telegram-bot:
    build: ./telegram-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - API_BASE_URL=http://api:8000
      - DB_PATH=/app/data/jobs.db
    volumes:
      - ./openclaw-skill/memory:/app/memory
      - ./data:/app/data:ro
    depends_on:
      - api

volumes:
  openclaw-data:
