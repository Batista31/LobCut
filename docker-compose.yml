services:
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    env_file:
      - ../.env
    container_name: mediascribe-python
    ports:
      - "8000:8000"
    volumes:
      - ./python-service:/app
      - ../../output:/app/output
      - mediascribe-db:/app/data
      - ./memory:/app/memory
      - ${WATCH_INBOX:-./data/inbox}:/watch/inbox:ro
      - ../../input:/watch/input:ro
    environment:
      - INPUT_ROOT=/watch/input
      - DB_PATH=/app/data/mediascribe.db
      - TEMP_DIR=/tmp/mediascribe
      - OUTPUT_DIR=/app/output
      - MEMORY_LOG_PATH=/app/memory/MEMORY_LOG.md
      - BURN_SUBTITLES=true
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${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}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MEDIA_SERVICE_URL=http://python-service:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw:
    image: node:22-slim
    env_file:
      - ../.env
    container_name: mediascribe-openclaw
    working_dir: /app
    volumes:
      - ./openclaw.json:/app/openclaw.json:ro
      - ./SOUL.md:/app/workspace/SOUL.md:ro
      - ./AGENTS.md:/app/workspace/AGENTS.md:ro
      - ./HEARTBEAT.md:/app/workspace/HEARTBEAT.md
      - ./skills:/app/workspace/skills:ro
      - ./memory:/app/workspace/memory
      - ../../input:/watch/input:ro
      - openclaw-data:/root/.openclaw
    environment:
      - MEDIA_SERVICE_URL=http://python-service:8000
    ports:
      - "18789:18789"
    command: >
      sh -c "rm -rf /usr/local/lib/node_modules/openclaw &&
             npm install -g openclaw@latest &&
             mkdir -p /root/.openclaw &&
             cp /app/openclaw.json /root/.openclaw/openclaw.json &&
             openclaw gateway --port 18789 --allow-unconfigured"
    depends_on:
      python-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mediascribe-db:
  openclaw-data:
